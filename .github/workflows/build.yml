name: Build Go Binary

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o pg-backup-service main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-backup-service-linux
          path: pg-backup-service
